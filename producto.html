<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Solutions - Detalle</title>
    <link rel="stylesheet" href="estilos.css">

    <style>
        body { background: #f5f5f5; }

        .contenedor-detalle {
            max-width: 1200px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            gap: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .col-img { flex: 1; text-align: center; }
        .col-img img { width: 100%; max-width: 400px; }

        .col-info { flex: 1; }

        .precio { font-size: 2rem; font-weight: bold; }

        .descripcion ul { margin-top:10px; padding-left:20px; }

        .contador { margin-top:20px; display:flex; gap:10px; }
    </style>
</head>
<body>

<!-- 🔥 BOTÓN VOLVER -->
<div style="max-width:1200px;margin:10px auto;">
    <button onclick="window.location.href='index.html'" style="
        background:#fff;border:1px solid #ccc;
        padding:8px 14px;border-radius:8px;cursor:pointer;
    ">
        ← Volver
    </button>
</div>

<div class="header-carrito-acceso" style="position: fixed; top: 15px; right: 20px;">
    <a href="carrito.html" style="background:#000;color:#fff;padding:10px 15px;border-radius:20px;">
        🛒 <span id="contador-carrito">0</span>
    </a>
</div>

<header style="text-align:center;padding:20px;">
    <h1 onclick="window.location.href='index.html'" style="cursor:pointer;">Home solutions</h1>
</header>

<main>
    <div class="contenedor-detalle">

        <div class="col-img">
            <img id="prod-img">
        </div>

        <div class="col-info">
            <h2 id="prod-nombre"></h2>
            <div class="precio" id="prod-precio"></div>

            <div id="prod-descripcion" class="descripcion"></div>

            <p>Stock: <strong id="prod-stock"></strong></p>

            <div class="contador">
                <button onclick="operarCantidadDetalle(-1)">-</button>
                <span id="contador-cantidad-detalle">1</span>
                <button onclick="operarCantidadDetalle(1)">+</button>
            </div>
        </div>

    </div>
</main>

<script src="productos.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id')) || 1;

    const producto = productosHogar.find(p => p.id === id);
    let carrito = JSON.parse(localStorage.getItem('carrito_hogar')) || [];

    const actualizarContador = () => {
        const total = carrito.reduce((sum, item) => sum + item.cantidad, 0);
        document.getElementById('contador-carrito').innerText = total;
    };

    actualizarContador();

    if (producto) {

        let item = carrito.find(p => p.id === producto.id);
        window.cantidadSeleccionada = item ? item.cantidad : 1;

        document.getElementById('prod-img').src = producto.imagen;
        document.getElementById('prod-nombre').innerText = producto.nombre;
        document.getElementById('prod-precio').innerText =
            "$" + producto.precio.toLocaleString("es-CO") + " COP";

        const descripciones = {
            1: { texto: "Sartén antiadherente de alta calidad ideal para cocinar saludablemente.", puntos:["No se pega","Fácil limpieza","Ahorra aceite"] },
            2: { texto: "Cuchillos de precisión profesional.", puntos:["Corte preciso","Duraderos","Ergonómicos"] }
        };

        const info = descripciones[producto.id];

        document.getElementById('prod-descripcion').innerHTML = `
            <p>${info?.texto || "Producto premium para tu hogar."}</p>
            <ul>${(info?.puntos || ["Alta calidad","Duradero","Funcional"])
            .map(p=>`<li>✔ ${p}</li>`).join("")}</ul>
        `;

        document.getElementById('prod-stock').innerText =
            producto.stock - window.cantidadSeleccionada;

        document.getElementById('contador-cantidad-detalle').innerText =
            window.cantidadSeleccionada;

        window.operarCantidadDetalle = (mod) => {
            let nueva = window.cantidadSeleccionada + mod;
            if (nueva < 1) nueva = 1;
            if (nueva > producto.stock) return;

            window.cantidadSeleccionada = nueva;

            let i = carrito.findIndex(p => p.id === producto.id);

            if (i !== -1) carrito[i].cantidad = nueva;
            else carrito.push({ ...producto, cantidad: nueva });

            localStorage.setItem('carrito_hogar', JSON.stringify(carrito));

            document.getElementById('contador-cantidad-detalle').innerText = nueva;
            document.getElementById('prod-stock').innerText = producto.stock - nueva;

            actualizarContador();
        };
    }

});
</script>

</body>
</html>
